<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #09090b; color: white; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; margin: 0;}

</style>
</head>
<body>
    <div class="text-center">
        <div class="glitch-text">403</div>
        <h2 class="fw-bold mb-3 mt-2">Доступ строго запрещен.</h2>
