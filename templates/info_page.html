{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | PC STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Анти-вспышка -->
<script>
    if (localStorage.getItem('pcstore_theme') === 'dark') {
        document.write('<style>html, body { background-color: #09090b !important; color: #f8fafc !important; }</style>');
    }
</script>

<style>
:root { --bg-light: #f8fafc; --bg-dark: #09090b; --card-light: #ffffff; --card-dark: #18181b; --text-light: #0f172a; --text-dark: #f8fafc; --accent-1: #6366f1; --accent-2: #a855f7; }
body { background: var(--bg-light); font-family: 'Montserrat', sans-serif; color: var(--text-light); transition: 0.4s; }
.navbar { background: rgba(255, 255, 255, 0.65) !important; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
.logo { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.theme-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; padding: 0 !important; background: white; color: #0f172a; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #e2e8f0; font-size: 18px; line-height: 1; }
.theme-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

.info-card { background: var(--card-light); border-radius: 32px; padding: 60px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.03); max-width: 800px; margin: 60px auto; position: relative; overflow: hidden; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.info-icon-wrap { width: 80px; height: 80px; border-radius: 20px; background: rgba(99,102,241,0.1); color: var(--accent-1); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 30px; }
.info-content { font-size: 18px; line-height: 1.8; color: #475569; }

/* Темная тема */
body.dark-mode { background: var(--bg-dark); color: var(--text-dark); }
body.dark-mode .navbar { background: rgba(9, 9, 11, 0.75) !important; border-color: rgba(255,255,255,0.05); }
body.dark-mode .theme-btn { background: #27272a; color: white; border-color: #3f3f46; }
body.dark-mode .info-card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
body.dark-mode .info-content { color: #cbd5e1; }
</style>
</head>
<body>

<script>
    if (localStorage.getItem('pcstore_theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<nav class="navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="{% url 'home' %}" class="logo">PC STORE</a>
        <div class="d-flex gap-3 align-items-center">
            <button id="theme-toggle" class="theme-btn"></button>
            <a href="{% url 'home' %}" class="btn btn-dark rounded-pill fw-bold px-4 py-2">В магазин</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="info-card">
        <div class="info-icon-wrap"><i class="bi {{ page.icon }}"></i></div>
        <h1 class="fw-black mb-4" style="font-size: 40px; letter-spacing: -1px;">{{ page.title }}</h1>
        <div class="info-content">
            {{ page.content|safe }}
        </div>
        <a href="{% url 'home' %}" class="btn btn-dark rounded-pill fw-bold px-5 py-3 mt-5 d-inline-flex align-items-center gap-2" style="background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); border: none;">
            <i class="bi bi-arrow-left"></i> Вернуться к покупкам
        </a>
    </div>
</div>

<script>
const themeToggleBtn = document.getElementById('theme-toggle');
const setIcon = () => { themeToggleBtn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️' : '🌙'; };
setIcon();
themeToggleBtn.addEventListener('click', function() { 
    document.body.classList.toggle('dark-mode'); 
    localStorage.setItem('pcstore_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
    setIcon();
});
</script>
</body>
</html>
