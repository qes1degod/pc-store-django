<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное | PC STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root { --bg-light: #f8fafc; --bg-dark: #09090b; --card-light: #ffffff; --card-dark: #18181b; --text-light: #0f172a; --text-dark: #f8fafc; --accent-1: #6366f1; --accent-2: #a855f7; }
body { background: var(--bg-light); font-family: 'Montserrat', sans-serif; color: var(--text-light); transition: 0.4s; }
.navbar { background: rgba(255, 255, 255, 0.65) !important; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
.logo { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }

.product-card { background: var(--card-light); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.03); border: 1px solid rgba(0,0,0,0.03); transition: 0.4s; display: flex; flex-direction: column; height: 100%; position: relative; }
.product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,0,0,.08); border-color: rgba(99, 102, 241, 0.2); }
.product-img-wrap { overflow: hidden; height: 220px; position: relative; background: #f1f5f9; display: flex; justify-content: center; align-items: center;}
.product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.7s; }
.product-card:hover .product-img-wrap img { transform: scale(1.08); }
.product-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
.product-name { font-size: 17px; font-weight: 800; line-height: 1.3; color: var(--text-light); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 44px;}
.price { font-size: 22px; font-weight: 900; color: var(--text-light); }
.btn-safe { white-space: nowrap; border-radius: 12px; font-weight: 700; transition: 0.3s; display: flex; align-items: center; justify-content: center; }

/* Темная тема */
body.dark-mode { background: var(--bg-dark); color: var(--text-dark); }
body.dark-mode .navbar { background: rgba(9, 9, 11, 0.75) !important; border-color: rgba(255,255,255,0.05); }
body.dark-mode .product-card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
body.dark-mode .product-card:hover { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 20px 50px rgba(168, 85, 247, 0.15); }
body.dark-mode .product-name, body.dark-mode .price { color: var(--text-dark); }
body.dark-mode .product-img-wrap { background: #27272a; }
</style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="{% url 'home' %}" class="logo">PC STORE</a>
        <div class="d-flex gap-3 align-items-center">
            <button id="theme-toggle" class="btn btn-light rounded-circle shadow-sm border-0 fs-5">🌙</button>
            <a href="{% url 'home' %}" class="btn btn-dark rounded-pill fw-bold px-4">В каталог</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h1 class="fw-black mb-4" style="font-size: 44px; letter-spacing: -1px;">❤️ Избранное</h1>
    
    <div class="row g-4">
        {% for item in items %}
        <div class="col-xl-3 col-lg-4 col-md-6" id="fav-item-{{ item.product.id }}">
            <div class="product-card">
                <div class="product-img-wrap">
                    {% if item.product.image %}<img src="{{ item.product.image }}">{% else %}<div class="fs-1 text-white">🖥️</div>{% endif %}
                </div>
                <div class="product-body">
                    <div class="product-name">{{ item.product.name }}</div>
                    <div class="text-secondary fw-semibold small mb-auto">{{ item.product.brand }}</div>
                    <div class="price mt-3 mb-3">{{ item.product.price|floatformat:0 }} ₽</div>
                    
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary flex-fill fw-bold rounded-3 add-to-cart" data-id="{{ item.product.id }}" style="background: var(--accent-1); border:none;">В корзину</button>
                        <button type="button" class="btn btn-light border btn-safe px-3 text-danger fav-btn" data-id="{{ item.product.id }}"><i class="bi bi-heart-fill"></i></button>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5 opacity-50">
            <i class="bi bi-heartbreak" style="font-size: 80px;"></i>
            <h3 class="fw-bold mt-4">В избранном пока пусто</h3>
            <a href="{% url 'home' %}" class="btn btn-dark rounded-pill px-4 mt-3 fw-bold">Выбрать железо</a>
        </div>
        {% endfor %}
    </div>
</div>

<script>
const themeToggleBtn = document.getElementById('theme-toggle');
if (localStorage.getItem('pcstore_theme') === 'dark') document.body.classList.add('dark-mode');
themeToggleBtn.addEventListener('click', function() { document.body.classList.toggle('dark-mode'); localStorage.setItem('pcstore_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); });

function getCookie(n) { let v=null; if(document.cookie){ document.cookie.split(';').forEach(c=>{ if(c.trim().startsWith(n+'=')) v=decodeURIComponent(c.trim().substring(n.length+1)); }); } return v; }
const csrftoken = getCookie('csrftoken');

document.addEventListener('click', function(e){
    const favBtn = e.target.closest('.fav-btn');
    if (favBtn) {
        e.preventDefault();
        const pId = favBtn.dataset.id;
        fetch(`/favorite/${pId}/`, { method: "POST", headers: { "X-CSRFToken": csrftoken, "Content-Type": "application/json" } })
        .then(r => r.json()).then(data => {
            if (!data.liked) {
                const card = document.getElementById(`fav-item-${pId}`);
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => { card.remove(); if (document.querySelectorAll('.col-xl-3').length === 0) location.reload(); }, 300);
            }
        });
    }

    const cartBtn = e.target.closest('.add-to-cart');
    if (cartBtn) {
        e.preventDefault();
        fetch(`/add/${cartBtn.dataset.id}/`, { method: "POST", headers: { "X-CSRFToken": csrftoken, "Content-Type": "application/json" } })
        .then(r => r.json()).then(data => {
            if (data.ok) {
                cartBtn.innerHTML = '<i class="bi bi-check2"></i> В корзине';
                cartBtn.classList.remove('btn-primary');
                cartBtn.classList.add('btn-success');
            }
        });
    }
});
</script>
</body>
</html>
