<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PC STORE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#0b1220;
    color:#e5e7eb;
    font-family:Arial;
}
.navbar{
    position:sticky;
    top:0;
    z-index:1000;
    background:#0f172a !important;
    border-bottom:1px solid #1f2937;
}
.logo{
    font-weight:800;
    font-size:20px;
    color:#60a5fa;
    letter-spacing:1px;
    text-decoration: none;
}
.search-box{
    width:420px;
    border-radius:12px;
    border:none;
    padding:10px 15px;
    background:#111827;
    color:white;
}
.product-card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    transition:.25s;
    overflow:hidden;
}
.product-card:hover{
    transform:translateY(-6px);
    border-color:#3b82f6;
    box-shadow:0 15px 30px rgba(59,130,246,0.2);
}
.btn-main{
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
    border:none;
    color:white;
    padding:8px 14px;
    border-radius:10px;
    transition:.2s;
}
.badge-glow{
    background:#2563eb;
    padding:4px 8px;
    border-radius:10px;
    font-size:12px;
}
.navbar .container{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
<div class="container">
    <a class="navbar-brand logo" href="/">💻 PC STORE</a>
    <form method="GET" action="/" class="d-flex">
        <input class="search-box" name="search" placeholder="Поиск товаров...">
    </form>
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'favorites' %}" class="text-white position-relative text-decoration-none">
            ❤️ <span class="badge-glow" id="fav-count">{{ favorite_count }}</span>
        </a>
        <a href="{% url 'cart' %}" class="text-white position-relative text-decoration-none">
            🛒 <span class="badge-glow" id="cart-count">{{ cart_count }}</span>
        </a>
        {% if user.is_authenticated %}
            <span class="text-secondary">{{ user.username }}</span>
            {% if user.is_staff %}
                <a href="/admin-dashboard/" class="btn btn-warning btn-sm">⚙ Admin</a>
            {% endif %}
            <a href="/logout/" class="btn btn-danger btn-sm">Выйти</a>
        {% else %}
            <a href="/login/" class="btn btn-primary btn-sm">Войти</a>
        {% endif %}
    </div>
</div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.ajax-btn');
        if (!btn) return;

        e.preventDefault(); // Глушим любые переходы
        const url = btn.getAttribute('data-url');
        if (!url) return;

        fetch(url, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                // Жестко перезагружаем страницу при успехе (гарантия обновления всех цифр и кнопок)
                window.location.reload();
            } else {
                alert('Ошибка! Убедитесь, что вы авторизованы.');
            }
        })
        .catch(err => console.error('Сбой:', err));
    });
</script>

</body>
</html>
