<style>
/* 🔥 СТИЛИ ДЛЯ 3D-ГОЛОГРАММЫ 🔥 */
.product-card {
    transform-style: preserve-3d;
    will-change: transform;
}
.holo-glare {
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    pointer-events: none;
    border-radius: inherit;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    mix-blend-mode: overlay;
}
body.dark-mode .holo-glare {
    mix-blend-mode: color-dodge;
}
/* Чтобы контент внутри не "сплющивался" при наклоне */
.product-img-wrap, .product-body {
    transform: translateZ(20px);
}
</style>

{% for product in products %}
<div class="col-xl-3 col-lg-4 col-md-6 reveal active">
    <div class="product-card" onmousemove="handleHoloMove(event, this)" onmouseleave="handleHoloLeave(this)">
        
        <div class="holo-glare"></div>

        <div class="product-img-wrap">
            {% if product.image %}
            <img src="{{ product.image }}" class="product-image-target">
            {% else %}
            <div class="w-100 h-100 d-flex justify-content-center align-items-center bg-dark text-white fs-1">🖥️</div>
            {% endif %}
        </div>

        <div class="product-body">
            <div class="product-name">{{ product.name }}</div>
            <div class="text-secondary fw-semibold small mb-auto">{{ product.brand }}</div>
            
            <div class="price mt-3 mb-3">{{ product.price|floatformat:0 }} ₽</div>

            <div class="d-flex flex-column gap-2">
                <button type="button" class="btn btn-main-cart btn-safe w-100 py-2 fs-6 add-to-cart" 
                        data-id="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price|floatformat:0 }}" data-image="{% if product.image %}{{ product.image }}{% endif %}">
                    В корзину
                </button>
                
                <div class="d-flex gap-2">
                    <a href="{% url 'product_detail' product.id %}" class="btn btn-light border btn-safe flex-fill py-2 text-dark">Обзор</a>
                    
                    <button type="button" class="btn btn-light border btn-safe px-3 fav-btn text-danger" data-id="{{ product.id }}">
                        {% if product.id in favorites_ids %}<i class="bi bi-heart-fill"></i>{% else %}<i class="bi bi-heart"></i>{% endif %}
                    </button>
                    
                    <button type="button" class="btn btn-light border btn-safe px-3 compare-btn text-primary" 
                            data-id="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price|floatformat:0 }}" data-brand="{{ product.brand }}" data-image="{% if product.image %}{{ product.image }}{% endif %}">
                        <i class="bi bi-bar-chart-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center py-5">
    <h3 class="fw-bold text-muted">По запросу ничего не найдено 😢</h3>
</div>
{% endfor %}

<script>
/* 🔥 СКРИПТ ДЛЯ 3D-ГОЛОГРАФИИ (РАБОТАЕТ ПРИ ВОЖДЕНИИ МЫШКОЙ) 🔥 */
function handleHoloMove(e, card) {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    // Расчет углов наклона (карточка наклоняется от мышки, создавая 3D-эффект)
    const rotateX = ((y - centerY) / centerY) * -12; // Наклон по оси X
    const rotateY = ((x - centerX) / centerX) * 12;  // Наклон по оси Y

    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px) scale(1.02)`;
    card.style.transition = 'none'; // Убираем плавность, чтобы карточка следовала за мышкой идеально ровно
    card.style.zIndex = '10';

    // Создаем крутую динамическую тень с обратной стороны наклона
    card.style.boxShadow = `0 25px 50px rgba(0,0,0,0.15), ${-rotateY}px ${rotateX}px 20px rgba(99, 102, 241, 0.2)`;

    // Управляем бликом света, который бегает за мышкой
    const glare = card.querySelector('.holo-glare');
    if (glare) {
        glare.style.opacity = '1';
        glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.4) 0%, transparent 60%)`;
    }
}

function handleHoloLeave(card) {
    // Возвращаем карточку в исходное положение при уходе мышки
    card.style.transform = '';
    card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease';
    card.style.zIndex = '2';
    card.style.boxShadow = '';
    
    // Прячем блик
    const glare = card.querySelector('.holo-glare');
    if (glare) {
        glare.style.opacity = '0';
    }
}
</script>
