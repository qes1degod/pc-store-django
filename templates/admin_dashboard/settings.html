<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки | Админ-панель</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root { --bg-light: #f8fafc; --bg-dark: #09090b; --card-light: #ffffff; --card-dark: #18181b; --text-light: #0f172a; --text-dark: #f8fafc; --accent-1: #8b5cf6; --accent-2: #d946ef; --sidebar-w: 260px; }
body { background: var(--bg-light); font-family: 'Montserrat', sans-serif; color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

.sidebar { width: var(--sidebar-w); background: var(--card-light); border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; padding: 30px 20px; z-index: 100; transition: 0.3s;}
.brand { display: flex; flex-direction: column; align-items: center; font-weight: 900; font-size: 24px; color: var(--accent-1); text-decoration: none; margin-bottom: 40px; }
.brand span { font-size: 11px; letter-spacing: 3px; color: var(--accent-2); text-transform: uppercase; margin-top: -2px; }
.nav-menu { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.nav-link { display: flex; align-items: center; gap: 15px; padding: 14px 20px; border-radius: 14px; color: #64748b; font-weight: 700; text-decoration: none; transition: 0.3s; }
.nav-link:hover { background: rgba(139, 92, 246, 0.05); color: var(--accent-1); }
.nav-link.active { background: rgba(139, 92, 246, 0.1); color: var(--accent-1); border-left: 4px solid var(--accent-1); }
.logout-btn { margin-top: auto; color: #a1a1aa; background: rgba(0,0,0,0.02); }
.logout-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

.main-wrapper { flex: 1; overflow-y: auto; padding: 30px 40px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.page-title { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin: 0; }

.bento-card { background: var(--card-light); border-radius: 32px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); height: 100%; transition: 0.3s;}
.bento-card:hover { border-color: var(--accent-1); }
.btn-theme { background: white; color: #0f172a; border: 1px solid #e2e8f0; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
.btn-theme:hover { transform: scale(1.05); }

.form-label { font-weight: 700; color: #64748b; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;}
.form-control { border-radius: 16px; font-weight: 600; padding: 14px 20px; border: 1px solid #e2e8f0; }
.form-control:focus { border-color: var(--accent-1); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); outline: none;}

.btn-gradient { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: white !important; font-weight: 800; border-radius: 100px; padding: 15px 35px; border: none; transition: 0.3s; }
.btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); }

.promo-badge-card { background: rgba(0,0,0,0.02); border-radius: 20px; padding: 18px 25px; border: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }

/* 🔥 ИСПРАВЛЕНИЕ ТЕМНОЙ ТЕМЫ 🔥 */
body.dark-mode { background: var(--bg-dark); color: var(--text-dark); }
body.dark-mode ::-webkit-scrollbar-thumb { background: #3f3f46; }
body.dark-mode .sidebar { background: var(--card-dark); border-color: rgba(255,255,255,0.02); }
body.dark-mode .bento-card { background: var(--card-dark); border-color: rgba(255,255,255,0.03); box-shadow: none; }
body.dark-mode .nav-link:not(.active) { color: #a1a1aa; }
body.dark-mode .nav-link:not(.active):hover { background: rgba(255,255,255,0.05); color: white; }
body.dark-mode .logout-btn { background: rgba(255,255,255,0.03); }
body.dark-mode .btn-theme { background: #27272a; color: #fbbf24; border-color: #3f3f46; }
body.dark-mode .form-control { background-color: #27272a; border-color: #3f3f46; color: white; }
body.dark-mode .promo-badge-card { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<aside class="sidebar">
    <a href="#" class="brand">PC STORE<span>ADMIN</span></a>
    <ul class="nav-menu">
        <li><a href="{% url 'admin_dashboard' %}" class="nav-link"><i class="bi bi-grid-fill"></i> Дашборд</a></li>
        <li><a href="{% url 'admin_orders' %}" class="nav-link"><i class="bi bi-box-seam-fill"></i> Заказы</a></li>
        <li><a href="{% url 'admin_products' %}" class="nav-link"><i class="bi bi-gpu-card"></i> Товары</a></li>
        <li><a href="{% url 'admin_users' %}" class="nav-link"><i class="bi bi-people-fill"></i> Пользователи</a></li>
        <li><a href="{% url 'admin_settings' %}" class="nav-link active"><i class="bi bi-gear-fill"></i> Настройки</a></li>
    </ul>
    <a href="{% url 'home' %}" class="nav-link logout-btn"><i class="bi bi-arrow-left-circle-fill"></i> В магазин</a>
</aside>

<main class="main-wrapper">
    <div class="top-bar">
        <h1 class="page-title"><i class="bi bi-sliders"></i> Конфигурация системы</h1>
        <button id="theme-toggle" class="btn-theme">🌙</button>
    </div>

    <div class="row g-4">
        <!-- БЛОК НАСТРОЕК КОНТАКТОВ -->
        <div class="col-lg-6">
            <div class="bento-card d-flex flex-column justify-content-between">
                <div>
                    <h4 class="fw-black mb-4"><i class="bi bi-globe2 text-primary me-2"></i> Параметры сайта</h4>
                    <div class="mb-3">
                        <label class="form-label">Бренд / Название проекта</label>
                        <input type="text" class="form-control fw-bold" value="PC STORE">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email для уведомлений</label>
                        <input type="email" class="form-control fw-bold" value="PCSTORE@mail.ru">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон в футере</label>
                        <input type="text" class="form-control fw-bold" value="+7 968 X22 13 XX">
                    </div>
                    <!-- 🔥 НОВАЯ СТРОЧКА АДРЕСА 🔥 -->
                    <div class="mb-4">
                        <label class="form-label">Официальный адрес шоурума (На главной)</label>
                        <input type="text" class="form-control fw-bold" value="г. Санкт-Петербург, Исаакиевская пл., 4, лит. А, 190000">
                    </div>
                </div>
                <button class="btn-gradient w-100 py-3"><i class="bi bi-shield-check"></i> Сохранить изменения</button>
            </div>
        </div>

        <!-- БЛОК ПРОМОКОДОВ -->
        <div class="col-lg-6">
            <div class="bento-card">
                <h4 class="fw-black mb-4"><i class="bi bi-ticket-perforated-fill text-warning me-2"></i> Управление промокодами</h4>
                
                <div class="promo-badge-card mb-4">
                    <div>
                        <div class="fw-black fs-4 text-primary">PCSTORE10</div>
                        <div class="text-secondary small fw-bold mt-1">Величина скидки: 10% от чека</div>
                    </div>
                    <button class="btn btn-sm btn-light border text-danger fw-bold rounded-pill px-3 py-2">Удалить</button>
                </div>

                <hr class="opacity-10 my-4">
                
                <h5 class="fw-bold mb-3">Выпустить новый купон</h5>
                <div class="row g-2 mb-4">
                    <div class="col-8">
                        <input type="text" class="form-control fw-bold" placeholder="Код (напр. WINTER26)">
                    </div>
                    <div class="col-4">
                        <input type="number" class="form-control fw-bold" placeholder="%">
                    </div>
                </div>
                <button class="btn btn-dark w-100 fw-bold rounded-pill py-3 border-0 bg-secondary bg-opacity-25 text-white">Активировать промокод</button>
            </div>
        </div>
    </div>
</main>

<script>
const themeToggleBtn = document.getElementById('theme-toggle');
const setIcon = () => themeToggleBtn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
if (localStorage.getItem('pcstore_theme') === 'dark') document.body.classList.add('dark-mode');
setIcon();
themeToggleBtn.addEventListener('click', function() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('pcstore_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    setIcon();
});
</script>
</body>
</html>
