<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PC STORE • Админ-панель</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0b0f19;
            color: white;
            font-family: Inter, sans-serif;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            border-right: 1px solid #1e293b;
        }

        .main {
            margin-left: 260px;
            padding: 28px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 18px;
            transition: .25s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 30px rgba(99,102,241,0.2);
        }

        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            background: linear-gradient(90deg,#6366f1,#22d3ee);
            cursor: pointer;
            font-weight: 500;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            padding: 22px;
            color: #60a5fa;
        }

        .nav a {
            display: block;
            padding: 12px 18px;
            color: #94a3b8;
            transition: .2s;
            border-radius: 10px;
            margin: 4px 10px;
        }

        .nav a:hover {
            background: #1e293b;
            color: white;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            right: 20px;
            top: 20px;
            background: #111827;
            padding: 12px 16px;
            border-left: 4px solid #22c55e;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">💎 PC STORE</div>

    <div class="nav">
        <a href="/admin-dashboard/">📊 Дашборд</a>
        <a href="/admin-dashboard/products/">📦 Товары</a>
        <a href="/admin-dashboard/orders/">🧾 Заказы</a>
        <a href="/admin-dashboard/users/">👤 Пользователи</a>
        <a href="/admin-dashboard/settings/">⚙️ Настройки</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<!-- TOAST -->
<div id="toast" class="toast">Готово</div>

<script>
function showToast(text){
    let t = document.getElementById("toast");
    t.innerText = text;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
