{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Успешно | PC STORE Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --bg-dark: #09090b;
    --card-dark: rgba(24, 24, 27, 0.7);
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --text-light: #f8fafc;
    --text-muted: #94a3b8;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
}

/* NAVBAR */
.navbar { background: rgba(9, 9, 11, 0.75) !important; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
.logo { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; letter-spacing: -1px; }

/* ФОНОВЫЕ СФЕРЫ */
.glow-orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; animation: float 10s infinite alternate ease-in-out; z-index: 1; pointer-events: none; }
.orb-1 { width: 400px; height: 400px; background: var(--accent-1); top: 10%; left: -100px; }
.orb-2 { width: 350px; height: 350px; background: var(--accent-2); bottom: 10%; right: -50px; animation-delay: -5s; }
@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

/* КАРТОЧКА УСПЕХА */
.success-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 10; }
.success-card {
    background: var(--card-dark);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 32px;
    padding: 60px 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    text-align: center;
    max-width: 550px;
    width: 100%;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.success-icon {
    width: 100px; height: 100px;
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
    border: 2px solid rgba(34, 197, 94, 0.3);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 50px;
    margin-bottom: 30px;
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
    animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
    opacity: 0; transform: scale(0.5);
}
@keyframes popIn { to { opacity: 1; transform: scale(1); } }

.title { font-size: 32px; font-weight: 900; margin-bottom: 15px; letter-spacing: -1px; }
.subtitle { color: var(--text-muted); font-size: 16px; line-height: 1.6; margin-bottom: 40px; font-weight: 500; }

.btn-mega {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: white;
    font-weight: 800; font-size: 16px;
    border: none; border-radius: 100px;
    padding: 18px;
    text-decoration: none; transition: 0.3s;
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
}
.btn-mega:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(168, 85, 247, 0.5); color: white; }

</style>
</head>
<body>

<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<nav class="navbar">
    <div class="container d-flex align-items-center">
        <a href="{% url 'home' %}" class="logo">PC STORE</a>
    </div>
</nav>

<div class="success-wrapper">
    <div class="success-card">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h1 class="title">Заявка успешно <span style="color: #22c55e;">принята!</span></h1>
        <p class="subtitle">Спасибо за доверие к PC STORE. Наши старшие инженеры уже получили вашу конфигурацию и начали подбор идеальных комплектующих. Мы свяжемся с вами в течение 15 минут для уточнения деталей.</p>
        
        <a href="{% url 'home' %}" class="btn-mega">
            <i class="bi bi-house-door-fill fs-5"></i> Вернуться на главную
        </a>
    </div>
</div>

</body>
</html>
