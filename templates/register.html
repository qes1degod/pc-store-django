<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b1120;
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.auth-card{
    background:#1e293b;
    padding:35px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    font-size:14px;
    color:#cbd5e1;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
    outline:none;
    margin-bottom:15px;
}

input:focus{
    border-color:#22c55e;
}

.btn-success{
    width:100%;
    padding:10px;
    border-radius:10px;
}

.link{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#38bdf8;
    text-decoration:none;
}

.link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="auth-card">

    <h2>Регистрация</h2>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div style="color:#f87171; font-size:12px;">
                    {{ field.errors }}
                </div>
            {% endif %}
        {% endfor %}

        <button class="btn btn-success mt-2">
            Создать аккаунт
        </button>
    </form>

    <a class="link" href="{% url 'login' %}">
        Уже есть аккаунт? Войти
    </a>

</div>

</body>
</html>
