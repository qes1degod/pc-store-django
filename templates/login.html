<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PC STORE — Вход</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 420px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 30px;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo span {
            color: #38bdf8;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #94a3b8;
        }

        .link a {
            color: #38bdf8;
            text-decoration: none;
        }

        .error {
            color: #f87171;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- 🔥 ЛОГО -->
    <div class="logo">
        PC <span>STORE</span>
    </div>
    <div class="subtitle">
        Вход в систему управления заказами
    </div>

    <!-- 🔐 ФОРМА -->
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            {{ field }}
            {% if field.errors %}
                <div class="error">{{ field.errors }}</div>
            {% endif %}
        {% endfor %}

        <button type="submit">Войти</button>
    </form>

    <!-- 🔗 REGISTER -->
    <div class="link">
        Нет аккаунта?
        <a href="{% url 'register' %}">Регистрация</a>
    </div>

</div>

</body>
</html>
