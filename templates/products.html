{% for product in products %}

<div class="col-lg-3 col-md-6 mb-4">

<div class="product-card">

{% if product.image %}
<img src="{{ product.image }}">
{% endif %}

<div class="product-body">

<div class="product-name">
{{ product.name }}
</div>

<div class="product-description">
{{ product.description|truncatechars:120 }}
</div>

<small>
{{ product.brand }}
</small>

<div class="price mt-2">
{{ product.price|floatformat:0 }} ₽
</div>

<div class="d-grid gap-2 mt-3">

<a href="{% url 'product_detail' product.id %}" class="btn btn-outline-dark">
Подробнее
</a>

<button type="button" class="btn btn-primary ajax-btn" data-url="{% url 'add_to_cart' product.id %}">
🛒 В корзину
</button>

<button type="button" class="btn btn-outline-danger ajax-btn" data-url="{% url 'toggle_favorite' product.id %}">
❤️ В избранное
</button>

</div>

</div>
</div>

</div>

{% endfor %}
