<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оплата заказа</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f6fa;
    font-family:Arial;
}

.box{
    max-width:500px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.1);
}

.total{
    font-size:28px;
    font-weight:900;
    color:#005bff;
}
</style>
</head>

<body>

<div class="box">

<h3>💳 Оплата заказа</h3>

<p>Заказ № {{ order.id }}</p>

<div class="total">
{{ order.total_price }} ₽
</div>

<hr>

<button class="btn btn-success w-100">
💳 Оплатить сейчас
</button>

<a href="/" class="btn btn-outline-primary w-100 mt-2">
На главную
</a>

</div>

</body>
</html>
